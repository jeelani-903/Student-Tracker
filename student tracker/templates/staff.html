<!DOCTYPE html>
<html>
 <meta charset="UTF-8">
  <title>STAFF LOGIN</title>
<style>

	.img1{
		width: 390px;
        height: 409px;
	}

    h2{
        text-align: center;
        font-size: 40px;
        color: black;
    }

	form {
		border: 3px solid #f1f1f1;
	}
	input[type=text],
	input[type=password] {
		width: 100%;
		padding: 12px 20px;
		margin: 8px 0;
		display: inline-block;
		border: 1px solid #ccc;
		box-sizing: border-box;
	}

	button {
		background-color: #4CAF50;
		color: white;
		padding: 14px 20px;
		margin: 8px 0;
		border: none;
		cursor: pointer;
		width: 100%;
	}

    .btn1{
        text-decoration: none;
        color: black;
    }

	button:hover {
		opacity: 0.8;
	}

	.cancelbtn {
		width: auto;
		padding: 10px 18px;
		background-color: #f44336;
	}

	.imgcontainer {
		text-align: center;
		margin: 24px 0 12px 0;
	}
       .container {
		padding: 16px;
	}
	span.psw {
		float: right;
		padding-top: 16px;
	}
	@media screen and (max-width: 300px) {
		span.psw {
			display: block;
			float: none;
		}
		.cancelbtn {
			width: 100%;
		}
	}
</style>

<body>
	<h2> STAFF LOGIN</h2>

	<form action="/action_page.php">
		<div class="imgcontainer">
			<img class="img1" src={{url_for('static', filename = 'images/user-2.png')}} >
		</div>

		<div class="container">
			<label><b>USERNAME</b></label>
			<input type="text" style="color: black;" placeholder="ENTER USERNAME" name="uname" required>

			<label><b>Password</b></label>
			<input type="password" placeholder="ENTER PASSWORD" name="psw" required>

			<a class="btn1" href="/profpage" type="hidden">Login</a>
		</div>

	</form>
	
</body>

</html>
